<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Rewards - Painel Administrativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #E8610A;
            --primary-dark: #B84D08;
            --primary-light: #FFF3EC;
            --bg-dark: #121218;
            --bg-card: #1c1c24;
            --bg-card-hover: #24242e;
            --bg-sidebar: #16161e;
            --bg-input: #2a2a36;
            --border: #2e2e3a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #6a6a7a;
            --accent-blue: #3B82F6;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --info: #6366F1;
        }

        html, body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100%;
            line-height: 1.5;
        }

        /* LOGIN PAGE */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1020 100%);
        }

        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box img { height: 48px; margin-bottom: 1.5rem; }
        .login-box h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
        .login-box p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 2rem; }
        .login-box .form-group { margin-bottom: 1rem; text-align: left; }
        .login-box .form-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
        .login-box .form-group input {
            width: 100%; padding: 0.7rem 1rem; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text-primary); font-size: 0.9rem; outline: none; transition: border 0.2s;
        }
        .login-box .form-group input:focus { border-color: var(--primary); }
        .login-error { color: var(--danger); font-size: 0.8rem; margin-bottom: 1rem; display: none; }

        /* TOP BAR */
        .top-bar {
            background: linear-gradient(90deg, #2d1b69 0%, #1e1145 100%);
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            position: sticky;
            top: 0;
            z-index: 200;
        }

        .top-bar-left { display: flex; align-items: center; gap: 1rem; }
        .top-bar-left img { height: 28px; }
        .top-bar-left .program-name { font-weight: 600; font-size: 0.95rem; color: #fff; }
        .top-bar-right { display: flex; align-items: center; gap: 1.2rem; }
        .top-bar-right a, .top-bar-right button {
            color: #c0c0d0; font-size: 0.8rem; text-decoration: none; background: none; border: none; cursor: pointer;
            display: flex; align-items: center; gap: 0.4rem; transition: color 0.2s;
        }
        .top-bar-right a:hover, .top-bar-right button:hover { color: #fff; }

        /* MODULE NAV */
        .module-nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            height: 48px;
            display: flex;
            align-items: stretch;
            padding: 0 1.5rem;
            position: sticky;
            top: 52px;
            z-index: 190;
            overflow-x: auto;
        }

        .module-nav button {
            padding: 0 1.25rem; background: none; border: none; border-bottom: 3px solid transparent;
            color: var(--text-secondary); font-size: 0.85rem; font-family: inherit; cursor: pointer;
            white-space: nowrap; transition: all 0.2s;
        }

        .module-nav button:hover { color: var(--text-primary); }
        .module-nav button.active {
            color: var(--accent-blue); border-bottom-color: var(--accent-blue); font-weight: 500;
        }

        /* APP LAYOUT */
        .app-layout {
            display: flex;
            min-height: calc(100vh - 100px);
        }

        .sidebar {
            width: 250px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 1.5rem 0;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .sidebar-item {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.65rem 1.5rem; cursor: pointer; transition: all 0.15s;
            color: var(--text-secondary); font-size: 0.85rem; border-left: 3px solid transparent;
        }

        .sidebar-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .sidebar-item.active {
            background: var(--accent-blue-bg); color: var(--accent-blue);
            border-left-color: var(--accent-blue); font-weight: 500;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .page-header h1 {
            font-size: 1.4rem; font-weight: 600; color: var(--accent-blue);
            margin-bottom: 1.5rem;
        }

        .btn {
            padding: 0.55rem 1.25rem; border-radius: 6px; font-size: 0.85rem; font-family: inherit;
            font-weight: 500; cursor: pointer; border: none; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 0.4rem;
        }

        .btn-primary { background: var(--accent-blue); color: #fff; }
        .btn-primary:hover { background: #2563EB; }

        .card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .card-header {
            padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        .card-body { padding: 1.25rem; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }

        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
            padding: 1.25rem;
        }

        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 600; margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.8rem; font-weight: 700; }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; font-weight: 600;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.75rem 1rem; font-size: 0.85rem; color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        .hidden { display: none !important; }

        @media (max-width: 1024px) {
            .sidebar { width: 200px; }
        }

        @media (max-width: 768px) {
            .stat-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-page">
    <div class="login-box">
        <img src="https://s3-sa-east-1.amazonaws.com/static.donuz.co/resources/uploads/lojaDePremios/logotipo/357587179122b4b517a85358b491435cb2a49logo.png" alt="Orange Rewards">
        <h2>Painel Administrativo</h2>
        <p>Acesse o back-office do Orange Rewards</p>
        <div class="login-error" id="loginError">Usuário ou senha inválidos</div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="loginEmail" placeholder="Digite seu e-mail" autocomplete="off">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginPassword" placeholder="Digite sua senha">
        </div>
        <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:0.5rem;" onclick="doLogin()">Entrar</button>
        <p style="margin-top:1.5rem; font-size:0.75rem; color:var(--text-muted);">Demo: admin@example.com / admin123</p>
    </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-left">
            <img src="https://s3-sa-east-1.amazonaws.com/static.donuz.co/resources/uploads/lojaDePremios/logotipo/357587179122b4b517a85358b491435cb2a49logo.png" alt="Orange Rewards">
            <span class="program-name">Orange Rewards</span>
        </div>
        <div class="top-bar-right">
            <span class="user-badge" id="userBadge">Admin</span>
            <span style="color:#c0c0d0; font-size:0.8rem;" id="userName">admin</span>
            <button onclick="doLogout()">Sair</button>
        </div>
    </div>

    <!-- MODULE NAV -->
    <div class="module-nav">
        <button class="active" onclick="switchModule('dashboard', this)">Dashboard</button>
        <button onclick="switchModule('clientes', this)">Clientes</button>
    </div>

    <!-- APP LAYOUT -->
    <div class="app-layout">
        <div class="main-content" id="mainContent">
            <!-- Content will be inserted here -->
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ttyzhuobvntfxuefaxjv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0eXpodW9idm50Znh1ZWZheGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTYzNzUsImV4cCI6MjA5MTc3MjM3NX0.O0vvUX4bgzKIOWuSYk4GUrZ-Am9e1DDgEBqF7HpYY4k';
    const API_BASE = SUPABASE_URL + '/functions/v1';
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentSession = null;
    let ds = null;

    class DataService {
        constructor(session) { this._session = session; }
        _fn(name) { return `${SUPABASE_URL}/functions/v1/${name}`; }
        _headers() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${this._session.access_token}`, 'apikey': SUPABASE_ANON_KEY }; }
        async _call(fn, path = '', method = 'GET', body = null) {
            const url = this._fn(fn) + (path ? `/${path}` : '');
            const opts = { method, headers: this._headers() };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error || 'Erro'); }
            return res.json();
        }
        async getClients(filters = {}) {
            const { data } = await _supabase.from('customers').select('*').limit(100);
            return (data || []).map(c => this._mapClient(c));
        }
        async getClientById(id) { const { data } = await _supabase.from('customers').select('*').eq('id', id).single(); return this._mapClient(data); }
        async getDashboard() { try { return await this._call('dashboard'); } catch(e) { return { totalClients: 0, activeClients: 0, pointsIssued: 0, redemptions: 0 }; } }
        _mapClient(c) { if(!c) return null; return {id:c.id,name:c.full_name||c.name,cpf:c.cpf||'',email:c.email||'',phone:c.phone||'',category:c.tier||'Basic',totalPoints:c.available_points??0,status:c.is_active!==false?'Ativo':'Inativo',joinDate:c.created_at?c.created_at.slice(0,10):'',birthday:c.birth_date||'',...c}; }
    }

    async function doLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value;
        const errEl = document.getElementById('loginError');
        errEl.style.display = 'none';

        const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });
        if (error) {
            errEl.textContent = 'Credenciais inválidas';
            errEl.style.display = 'block';
            return;
        }

        currentSession = data.session;
        ds = new DataService(data.session);
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('adminPanel').classList.remove('hidden');
        document.getElementById('userName').textContent = email;
        switchModule('dashboard');
    }

    function switchModule(module) {
        const content = document.getElementById('mainContent');
        if (module === 'dashboard') {
            content.innerHTML = `
                <div class="page-header"><h1>Dashboard</h1></div>
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total de Clientes</div>
                        <div class="stat-value" id="totalClients">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Pontos Emitidos</div>
                        <div class="stat-value" id="pointsIssued">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Resgates</div>
                        <div class="stat-value" id="redemptions">0</div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h3>Clientes Recentes</h3></div>
                    <div class="card-body">
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr><th>Nome</th><th>E-mail</th><th>Pontos</th><th>Status</th></tr>
                                </thead>
                                <tbody id="clientsTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            loadDashboard();
        } else if (module === 'clientes') {
            content.innerHTML = `
                <div class="page-header"><h1>Clientes</h1></div>
                <div class="card">
                    <div class="card-body">
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr><th>Nome</th><th>E-mail</th><th>CPF</th><th>Pontos</th><th>Status</th></tr>
                                </thead>
                                <tbody id="clientsFullTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            loadClients();
        }
    }

    async function loadDashboard() {
        try {
            const dashboard = await ds.getDashboard();
            document.getElementById('totalClients').textContent = dashboard.totalClients || 0;
            document.getElementById('pointsIssued').textContent = (dashboard.pointsIssued || 0).toLocaleString('pt-BR');
            document.getElementById('redemptions').textContent = dashboard.redemptions || 0;

            const clients = await ds.getClients();
            const tbody = document.getElementById('clientsTable');
            tbody.innerHTML = clients.slice(0, 5).map(c => `
                <tr>
                    <td>${c.name}</td>
                    <td>${c.email}</td>
                    <td>${c.totalPoints.toLocaleString('pt-BR')}</td>
                    <td>${c.status}</td>
                </tr>
            `).join('');
        } catch (e) {
            console.error('Erro ao carregar dashboard:', e);
        }
    }

    async function loadClients() {
        try {
            const clients = await ds.getClients();
            const tbody = document.getElementById('clientsFullTable');
            tbody.innerHTML = clients.map(c => `
                <tr>
                    <td>${c.name}</td>
                    <td>${c.email}</td>
                    <td>${c.cpf}</td>
                    <td>${c.totalPoints.toLocaleString('pt-BR')}</td>
                    <td>${c.status}</td>
                </tr>
            `).join('');
        } catch (e) {
            console.error('Erro ao carregar clientes:', e);
        }
    }

    async function doLogout() {
        await _supabase.auth.signOut();
        window.location.href = '/';
    }

    // Check if already logged in
    (async () => {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            currentSession = session;
            ds = new DataService(session);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('userName').textContent = session.user.email;
            switchModule('dashboard');
        }
    })();
</script>

</body>
</html>
