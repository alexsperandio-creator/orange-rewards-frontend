<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Rewards - Painel Administrativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           CSS VARIABLES & RESET
           ============================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #E8610A;
            --primary-dark: #B84D08;
            --primary-light: #FFF3EC;
            --bg-dark: #121218;
            --bg-card: #1c1c24;
            --bg-card-hover: #24242e;
            --bg-sidebar: #16161e;
            --bg-input: #2a2a36;
            --border: #2e2e3a;
            --border-light: #3a3a48;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #6a6a7a;
            --accent-blue: #3B82F6;
            --accent-blue-bg: rgba(59, 130, 246, 0.15);
            --success: #10B981;
            --success-bg: rgba(16, 185, 129, 0.15);
            --warning: #F59E0B;
            --warning-bg: rgba(245, 158, 11, 0.15);
            --danger: #EF4444;
            --danger-bg: rgba(239, 68, 68, 0.15);
            --info: #6366F1;
            --info-bg: rgba(99, 102, 241, 0.15);
            --sidebar-width: 250px;
            --topnav-height: 52px;
            --modulenav-height: 48px;
        }

        html, body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100%;
            line-height: 1.5;
        }

        /* ============================================
           LOGIN PAGE
           ============================================ */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1020 100%);
        }
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box img { height: 48px; margin-bottom: 1.5rem; }
        .login-box h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
        .login-box p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 2rem; }
        .login-box .form-group { margin-bottom: 1rem; text-align: left; }
        .login-box .form-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
        .login-box .form-group input {
            width: 100%; padding: 0.7rem 1rem; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text-primary); font-size: 0.9rem; outline: none; transition: border 0.2s;
        }
        .login-box .form-group input:focus { border-color: var(--primary); }
        .login-error { color: var(--danger); font-size: 0.8rem; margin-bottom: 1rem; display: none; }

        /* ============================================
           TOP NAVIGATION (Purple bar like Donuz)
           ============================================ */
        .top-bar {
            background: linear-gradient(90deg, #2d1b69 0%, #1e1145 100%);
            height: var(--topnav-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .top-bar-left { display: flex; align-items: center; gap: 1rem; }
        .top-bar-left img { height: 28px; }
        .top-bar-left .program-name { font-weight: 600; font-size: 0.95rem; color: #fff; }
        .top-bar-right { display: flex; align-items: center; gap: 1.2rem; }
        .top-bar-right a, .top-bar-right button {
            color: #c0c0d0; font-size: 0.8rem; text-decoration: none; background: none; border: none; cursor: pointer;
            display: flex; align-items: center; gap: 0.4rem; transition: color 0.2s;
        }
        .top-bar-right a:hover, .top-bar-right button:hover { color: #fff; }
        .top-bar-right .user-badge {
            background: rgba(255,255,255,0.15); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; color: #fff;
        }
        .mode-toggle { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: #c0c0d0; }
        .mode-toggle .toggle {
            width: 36px; height: 20px; background: rgba(255,255,255,0.2); border-radius: 10px; position: relative; cursor: pointer;
        }
        .mode-toggle .toggle::after {
            content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
            background: #fff; border-radius: 50%; transition: left 0.2s;
        }
        .mode-toggle .toggle.active { background: var(--success); }
        .mode-toggle .toggle.active::after { left: 18px; }

        /* ============================================
           MODULE NAVIGATION (Second row)
           ============================================ */
        .module-nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            height: var(--modulenav-height);
            display: flex;
            align-items: stretch;
            padding: 0 1.5rem;
            position: sticky;
            top: var(--topnav-height);
            z-index: 190;
            overflow-x: auto;
        }
        .module-nav button {
            padding: 0 1.25rem; background: none; border: none; border-bottom: 3px solid transparent;
            color: var(--text-secondary); font-size: 0.85rem; font-family: inherit; cursor: pointer;
            white-space: nowrap; transition: all 0.2s;
        }
        .module-nav button:hover { color: var(--text-primary); }
        .module-nav button.active {
            color: var(--accent-blue); border-bottom-color: var(--accent-blue); font-weight: 500;
        }

        /* ============================================
           LAYOUT: SIDEBAR + MAIN CONTENT
           ============================================ */
        .app-layout {
            display: flex;
            min-height: calc(100vh - var(--topnav-height) - var(--modulenav-height));
        }
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 1.5rem 0;
            flex-shrink: 0;
            overflow-y: auto;
        }
        .sidebar-title {
            font-size: 0.85rem; font-weight: 600; color: var(--text-muted);
            padding: 0 1.5rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .sidebar-item {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.65rem 1.5rem; cursor: pointer; transition: all 0.15s;
            color: var(--text-secondary); font-size: 0.85rem; border-left: 3px solid transparent;
        }
        .sidebar-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .sidebar-item.active {
            background: var(--accent-blue-bg); color: var(--accent-blue);
            border-left-color: var(--accent-blue); font-weight: 500;
        }
        .sidebar-item svg { width: 18px; height: 18px; flex-shrink: 0; }
        .sidebar-item .icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            max-width: calc(100% - var(--sidebar-width));
        }

        /* ============================================
           PAGE HEADER
           ============================================ */
        .page-header {
            margin-bottom: 2rem;
        }
        .page-header h1 {
            font-size: 1.4rem; font-weight: 600; color: var(--accent-blue);
            margin-bottom: 0.25rem;
        }
        .page-header h1::after {
            content: ''; display: block; width: 50px; height: 3px;
            background: var(--accent-blue); border-radius: 2px; margin-top: 0.5rem;
        }
        .page-header .subtitle { color: var(--text-secondary); font-size: 0.85rem; }
        .page-header-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }

        /* ============================================
           BUTTONS
           ============================================ */
        .btn {
            padding: 0.55rem 1.25rem; border-radius: 6px; font-size: 0.85rem; font-family: inherit;
            font-weight: 500; cursor: pointer; border: none; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 0.4rem;
        }
        .btn-primary { background: var(--accent-blue); color: #fff; }
        .btn-primary:hover { background: #2563EB; }
        .btn-orange { background: var(--primary); color: #fff; }
        .btn-orange:hover { background: var(--primary-dark); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #DC2626; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #059669; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .btn-outline:hover { border-color: var(--text-secondary); color: var(--text-primary); }
        .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.78rem; }
        .btn-icon { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; }
        .btn-icon.edit { background: var(--accent-blue); color: #fff; }
        .btn-icon.delete { background: var(--danger); color: #fff; }

        /* ============================================
           FORM ELEMENTS
           ============================================ */
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.4rem; }
        .form-input, .form-select, .form-textarea {
            width: 100%; padding: 0.6rem 0.9rem; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text-primary); font-size: 0.85rem; font-family: inherit;
            outline: none; transition: border 0.2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent-blue); }
        .form-select { cursor: pointer; }
        .form-textarea { min-height: 100px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .form-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem; }
        .form-file-input { padding: 0.5rem; }

        /* ============================================
           CARDS
           ============================================ */
        .card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
        }
        .card-header {
            padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .card-header h3 { font-size: 0.95rem; font-weight: 600; }
        .card-body { padding: 1.25rem; }

        /* Stat cards for dashboard */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
            padding: 1.25rem; position: relative; overflow: hidden;
        }
        .stat-card.blue { border-left: 4px solid var(--accent-blue); }
        .stat-card.green { border-left: 4px solid var(--success); }
        .stat-card.orange { border-left: 4px solid var(--warning); }
        .stat-card.red { border-left: 4px solid var(--danger); }
        .stat-card .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 600; margin-bottom: 0.5rem; }
        .stat-card .stat-value { font-size: 1.8rem; font-weight: 700; }
        .stat-card .stat-change { font-size: 0.75rem; color: var(--success); margin-top: 0.3rem; }
        .stat-card .stat-icon { position: absolute; top: 1rem; right: 1rem; opacity: 0.2; font-size: 2rem; }

        /* KPI row */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .kpi-item {
            display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
        }
        .kpi-item .kpi-icon {
            width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .kpi-item .kpi-icon.blue { background: var(--accent-blue-bg); color: var(--accent-blue); }
        .kpi-item .kpi-icon.green { background: var(--success-bg); color: var(--success); }
        .kpi-item .kpi-icon.orange { background: var(--warning-bg); color: var(--warning); }
        .kpi-item .kpi-icon.purple { background: var(--info-bg); color: var(--info); }
        .kpi-item .kpi-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
        .kpi-item .kpi-value { font-size: 1.1rem; font-weight: 700; }

        /* ============================================
           TABLE
           ============================================ */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; font-weight: 600;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.75rem 1rem; font-size: 0.85rem; color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }
        tr:hover td { background: var(--bg-card-hover); }
        .table-actions { display: flex; gap: 0.4rem; }

        /* Pagination */
        .table-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem 0; font-size: 0.8rem; color: var(--text-muted);
        }
        .pagination { display: flex; gap: 0.3rem; }
        .pagination button {
            padding: 0.3rem 0.6rem; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 4px; color: var(--text-secondary); cursor: pointer; font-size: 0.8rem;
        }
        .pagination button.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }

        /* ============================================
           BADGES & TAGS
           ============================================ */
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
        }
        .badge-success { background: var(--success-bg); color: var(--success); }
        .badge-warning { background: var(--warning-bg); color: var(--warning); }
        .badge-danger { background: var(--danger-bg); color: var(--danger); }
        .badge-info { background: var(--accent-blue-bg); color: var(--accent-blue); }
        .badge-muted { background: rgba(100,100,120,0.2); color: var(--text-muted); }

        /* ============================================
           SEARCH BAR
           ============================================ */
        .search-bar {
            display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: flex-end;
        }
        .search-bar .form-group { margin-bottom: 0; flex: 1; min-width: 180px; }

        /* ============================================
           TABS (sub-tabs within modules)
           ============================================ */
        .sub-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
        .sub-tabs button {
            padding: 0.6rem 1.25rem; background: none; border: none; border-bottom: 2px solid transparent;
            color: var(--text-secondary); font-size: 0.85rem; font-family: inherit; cursor: pointer;
        }
        .sub-tabs button.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); font-weight: 500; }

        /* ============================================
           ALERT / NOTICE
           ============================================ */
        .alert {
            padding: 0.85rem 1.25rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1.5rem;
            display: flex; align-items: center; gap: 0.75rem;
        }
        .alert-info { background: var(--accent-blue-bg); color: var(--accent-blue); border: 1px solid rgba(59,130,246,0.3); }
        .alert-warning { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
        .alert-success { background: var(--success-bg); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }

        /* ============================================
           MODAL
           ============================================ */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 500; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
            width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto;
        }
        .modal-header {
            padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .modal-header h3 { font-size: 1.1rem; }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        .modal-body { padding: 1.5rem; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 0.75rem; }

        /* ============================================
           TOAST NOTIFICATION
           ============================================ */
        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 600; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast {
            padding: 0.85rem 1.25rem; border-radius: 8px; font-size: 0.85rem; color: #fff;
            min-width: 280px; animation: slideIn 0.3s ease;
        }
        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        .toast-info { background: var(--accent-blue); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* ============================================
           DICA BOX (like Donuz tips)
           ============================================ */
        .dica-box {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
            padding: 1.25rem; margin-bottom: 1.5rem;
        }
        .dica-box h4 { font-size: 0.9rem; margin-bottom: 0.5rem; }
        .dica-box p { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6; }

        /* ============================================
           UTILITY CLASSES
           ============================================ */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .text-muted { color: var(--text-muted); }
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .mb-3 { margin-bottom: 1.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }
        .gap-1 { gap: 0.5rem; }
        .flex { display: flex; }
        .flex-wrap { flex-wrap: wrap; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }

        /* ============================================
           RESPONSIVE
           ============================================ */
        .mobile-hamburger { display: none; background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; }
        @media (max-width: 1024px) {
            .sidebar { position: fixed; left: -260px; top: calc(var(--topnav-height) + var(--modulenav-height)); bottom: 0; z-index: 150; transition: left 0.3s; }
            .sidebar.open { left: 0; }
            .main-content { max-width: 100%; }
            .mobile-hamburger { display: block; }
        }
        @media (max-width: 768px) {
            .module-nav { padding: 0 0.75rem; }
            .module-nav button { padding: 0 0.75rem; font-size: 0.78rem; }
            .main-content { padding: 1.25rem; }
            .stat-grid { grid-template-columns: repeat(2, 1fr); }
            .form-row { grid-template-columns: 1fr; }
            .top-bar-right .hide-mobile { display: none; }
        }
        @media (max-width: 480px) {
            .stat-grid { grid-template-columns: 1fr; }
        }
    </style>
    <script src="/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- ============================================
     LOGIN PAGE
     ============================================ -->
<div id="loginPage" class="login-page">
    <div class="login-box">
        <img src="https://s3-sa-east-1.amazonaws.com/static.donuz.co/resources/uploads/lojaDePremios/logotipo/357587179122b4b517a85358b491435cb2a49logo.png" alt="Orange Rewards">
        <h2>Painel Administrativo</h2>
        <p>Acesse o back-office do Orange Rewards</p>
        <div class="login-error" id="loginError">Usuário ou senha inválidos</div>
        <div class="form-group">
            <label>Usuário</label>
            <input type="text" id="loginUser" placeholder="Digite seu usuário" autocomplete="off">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginPass" placeholder="Digite sua senha">
        </div>
        <button class="btn btn-primary" style="width:100%; margin-top:0.5rem; justify-content:center;" onclick="doLogin()">Entrar</button>
        <p style="margin-top:1.5rem; font-size:0.75rem; color:var(--text-muted);">Admin: admin / admin123<br>Operador: operador / oper123</p>
    </div>
</div>

<!-- ============================================
     ADMIN PANEL (hidden until login)
     ============================================ -->
<div id="adminPanel" class="hidden">

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-left">
            <button class="mobile-hamburger" onclick="toggleSidebar()">☰</button>
            <img src="https://s3-sa-east-1.amazonaws.com/static.donuz.co/resources/uploads/lojaDePremios/logotipo/357587179122b4b517a85358b491435cb2a49logo.png" alt="Orange Rewards">
            <span class="program-name">Orange Rewards</span>
        </div>
        <div class="top-bar-right">
            <a href="#" onclick="goToLP()" class="hide-mobile">👁 Site fidelidade</a>
            <span class="user-badge" id="userBadge">Admin</span>
            <span class="hide-mobile" style="color:#c0c0d0; font-size:0.8rem;" id="userName">admin</span>
            <button onclick="doLogout()">Sair</button>
        </div>
    </div>

    <!-- MODULE NAVIGATION -->
    <div class="module-nav" id="moduleNav">
        <button class="active" onclick="switchModule('dashboard', this)">Dashboard</button>
        <button onclick="switchModule('clientes', this)">Clientes</button>
        <button onclick="switchModule('pontos', this)">Pontos</button>
        <button onclick="switchModule('premios', this)">Prêmios</button>
        <button onclick="switchModule('resgates', this)">Resgates</button>
        <button onclick="switchModule('feedback', this)">Feedback</button>
        <button onclick="switchModule('marketing', this)">Marketing</button>
        <button onclick="switchModule('config', this)" data-role="admin">Configurações</button>
    </div>

    <!-- APP LAYOUT -->
    <div class="app-layout">

    async getClients(filters = {}) {
        let result = [...this.clients];
        if (filters.search) {
            const s = filters.search.toLowerCase();
            result = result.filter(c => c.name.toLowerCase().includes(s) || c.cpf.includes(s) || c.email.toLowerCase().includes(s));
        }
        if (filters.status) result = result.filter(c => c.status === filters.status);
        if (filters.category) result = result.filter(c => c.category === filters.category);
        return result;
    }
    async getClientById(id) { return this.clients.find(c => c.id === id); }
    async createClient(data) {
        const newClient = { id: this.clients.length + 1, ...data, status: 'Ativo', totalPoints: 0, totalSpent: 0, joinDate: new Date().toISOString().slice(0,10) };
        this.clients.unshift(newClient);
        return newClient;
    }
    async updateClient(id, data) {
        const idx = this.clients.findIndex(c => c.id === id);
        if (idx >= 0) { this.clients[idx] = { ...this.clients[idx], ...data }; return this.clients[idx]; }
        return null;
    }
    async importClients(rows) {
        let imported = 0;
        rows.forEach(row => {
            if (row.name) { this.clients.push({ id: this.clients.length + 1, ...row, status: 'Ativo', totalPoints: 0, totalSpent: 0, joinDate: new Date().toISOString().slice(0,10) }); imported++; }
        });
        return { imported, total: rows.length };
    }
    async getClientCategories() { return [...this.categories]; }
    async getClientsByBirthday(month) { return this.clients.filter(c => c.birthday && parseInt(c.birthday.split('-')[1]) === month); }

    // ---- POINT METHODS ----
    async getPointRules() { return [...this.pointRules]; }
    async insertPoints(clientId, amount, ruleId, description = '') {
        const rule = this.pointRules.find(r => r.id === ruleId);
        const points = amount * (rule ? rule.multiplier : 1);
        const txn = { id: this.pointTransactions.length + 1, clientId, type: 'Inserção', points, rule: rule?.name || '', description: description || `Inserção - ${rule?.name}`, date: new Date().toISOString().slice(0,10), clientName: (this.clients.find(c => c.id === clientId))?.name || '' };
        this.pointTransactions.unshift(txn);
        const client = this.clients.find(c => c.id === clientId);
        if (client) { client.totalPoints += points; this._updateCategory(client); }
        return txn;
    }
    async reversePoints(clientId, amount, reason) {
        const txn = { id: this.pointTransactions.length + 1, clientId, type: 'Estorno', points: -amount, rule: '', description: `Estorno - ${reason}`, date: new Date().toISOString().slice(0,10), clientName: (this.clients.find(c => c.id === clientId))?.name || '' };
        this.pointTransactions.unshift(txn);
        const client = this.clients.find(c => c.id === clientId);
        if (client) { client.totalPoints = Math.max(0, client.totalPoints - amount); this._updateCategory(client); }
        return txn;
    }
    async getPointTransactions(filters = {}) {
        let result = [...this.pointTransactions];
        if (filters.clientId) result = result.filter(t => t.clientId === filters.clientId);
        if (filters.type) result = result.filter(t => t.type === filters.type);
        return result;
    }
    async createPointRule(data) {
        const rule = { id: Math.max(...this.pointRules.map(r => r.id)) + 1, ...data };
        this.pointRules.push(rule);
        return rule;
    }
    _updateCategory(client) {
        const pts = client.totalPoints;
        for (const cat of [...this.categories].reverse()) { if (pts >= cat.min) { client.category = cat.title; break; } }
    }

    // ---- PRIZE METHODS ----
    async getPrizes(filters = {}) {
        let result = [...this.prizes];
        if (filters.category) result = result.filter(p => p.category === filters.category);
        if (filters.search) { const s = filters.search.toLowerCase(); result = result.filter(p => p.name.toLowerCase().includes(s)); }
        return result;
    }
    async createPrize(data) {
        const prize = { id: this.prizes.length + 1, ...data, status: 'Ativo', visible: true };
        this.prizes.push(prize);
        return prize;
    }
    async updatePrize(id, data) {
        const idx = this.prizes.findIndex(p => p.id === id);
        if (idx >= 0) { this.prizes[idx] = { ...this.prizes[idx], ...data }; return this.prizes[idx]; }
        return null;
    }
    async getPrizeCategories() { return [...this.prizeCategories]; }
    async createPrizeCategory(data) {
        const cat = { id: this.prizeCategories.length + 1, ...data };
        this.prizeCategories.push(cat);
        return cat;
    }

    // ---- REDEMPTION METHODS ----
    async getRedemptions(filters = {}) {
        let result = [...this.redemptions];
        if (filters.status) result = result.filter(r => r.status === filters.status);
        if (filters.search) { const s = filters.search.toLowerCase(); result = result.filter(r => r.voucher.toLowerCase().includes(s) || r.clientName.toLowerCase().includes(s)); }
        return result;
    }
    async redeemPrize(clientId, prizeId) {
        const client = this.clients.find(c => c.id === clientId);
        const prize = this.prizes.find(p => p.id === prizeId);
        if (!client || !prize) return { error: 'Cliente ou prêmio não encontrado' };
        if (client.totalPoints < prize.points) return { error: 'Pontos insuficientes' };
        client.totalPoints -= prize.points;
        this._updateCategory(client);
        const redemption = { id: this.redemptions.length + 1, voucher: `VCH-${Date.now().toString().slice(-6)}`, clientId, clientName: client.name, prizeId, prizeName: prize.name, points: prize.points, status: 'Pendente', date: new Date().toISOString().slice(0,10) };
        this.redemptions.unshift(redemption);
        this.pointTransactions.unshift({ id: this.pointTransactions.length + 1, clientId, clientName: client.name, type: 'Resgate', points: -prize.points, rule: '', description: `Resgate - ${prize.name}`, date: new Date().toISOString().slice(0,10) });
        return redemption;
    }

    // ---- MARKETING / FEEDBACK ----
    async getAutomations() { return [...this.automations]; }
    async getSurveys() { return [...this.surveys]; }
    async getEmailTemplates() { return [...this.emailTemplates]; }

    // ---- DASHBOARD ----
    async getDashboardStats() { return { ...this.dashboardStats }; }
}

function doLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    const users = { admin: { password: 'admin123', role: 'Admin' }, operador: { password: 'oper123', role: 'Operador' } };
    if (users[user] && users[user].password === pass) {
        currentUser = { username: user, role: users[user].role };
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        document.getElementById('userBadge').textContent = currentUser.role;
        document.getElementById('userName').textContent = user;
        // Hide admin-only module nav buttons if operador
        if (currentUser.role === 'Operador') {
            document.querySelectorAll('.module-nav button[data-role="admin"]').forEach(b => b.classList.add('hidden'));
        }
        ds = new DataService();
        switchModule('dashboard', document.querySelector('.module-nav button'));
    } else {
        document.getElementById('loginError').style.display = 'block';
    }
}

    currentUser = null;
    document.getElementById('adminPanel').classList.add('hidden');
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginError').style.display = 'none';
}

/* ============================================
   NAVIGATION
   ============================================ */
function switchModule(module, btnEl) {
    currentModule = module;
    // Update nav active state
    document.querySelectorAll('.module-nav button').forEach(b => b.classList.remove('active'));
    if (btnEl) btnEl.classList.add('active');
    // Render sidebar
    renderSidebar(module);
    // Load default sub-page
    const sidebarItems = SIDEBAR_CONFIG[module];
    if (sidebarItems && sidebarItems.length > 0) {
        const firstVisible = sidebarItems.find(item => !item.role || currentUser.role.toLowerCase() === item.role);
        if (firstVisible) switchSubPage(firstVisible.id);
        else renderModulePage(module);
    } else {
        renderModulePage(module);
    }
}

function renderSidebar(module) {
    const sidebar = document.getElementById('sidebar');
    const items = SIDEBAR_CONFIG[module] || [];
    if (items.length === 0) { sidebar.innerHTML = ''; sidebar.style.display = 'none'; return; }
    sidebar.style.display = 'block';
    let html = '';
    items.forEach(item => {
        if (item.role && currentUser.role.toLowerCase() !== item.role) return;
        html += `<div class="sidebar-item" data-page="${item.id}" onclick="switchSubPage('${item.id}')">
            <span class="icon">${item.icon}</span> ${item.label}
        </div>`;
    });
    sidebar.innerHTML = html;
}

function switchSubPage(pageId) {
    currentSubPage = pageId;
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    const active = document.querySelector(`.sidebar-item[data-page="${pageId}"]`);
    if (active) active.classList.add('active');
    renderModulePage(currentModule, pageId);
    // Close sidebar on mobile
    document.getElementById('sidebar').classList.remove('open');
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

    const main = document.getElementById('mainContent');

    const text = await fileInput.files[0].text();
    const lines = text.split('\n').filter(l => l.trim());
    const rows = lines.map(line => {
        const cols = line.split(';');
        return { name: cols[0]?.trim(), cpf: cols[1]?.trim(), email: cols[2]?.trim(), phone: cols[3]?.trim(), birthday: cols[4]?.trim(), gender: cols[5]?.trim(), category: 'Basic' };
    });
    const result = await ds.importClients(rows);
    showToast(`${result.imported} clientes importados de ${result.total} registros!`, 'success');
}

async function doImportPoints() {
    const fileInput = document.getElementById('importPointsFile');
    if (!fileInput.files[0]) { showToast('Selecione um arquivo', 'error'); return; }
    const text = await fileInput.files[0].text();
    const lines = text.split('\n').filter(l => l.trim());
    let imported = 0;
    for (const line of lines) {
        const [cpf, valor, regra, desc] = line.split(';').map(s => s.trim());
        const clients = await ds.getClients({ search: cpf });
        if (clients.length > 0) {
            const rule = ds.pointRules.find(r => r.name.toLowerCase() === regra?.toLowerCase() || r.code.toLowerCase() === regra?.toLowerCase());
            await ds.insertPoints(clients[0].id, parseFloat(valor) || 0, rule?.id || 0, desc || '');
            imported++;
        }
    }
    showToast(`${imported} transações importadas de ${lines.length} linhas!`, 'success');
}

async function saveNewPrize() {
    const name = document.getElementById('newPrizeName').value;
    const points = parseInt(document.getElementById('newPrizePoints').value);
    const category = parseInt(document.getElementById('newPrizeCat').value);
    if (!name || !points) { showToast('Preencha nome e pontos', 'error'); return; }
    await ds.createPrize({ name, points, category: category || 1 });
    showToast('Prêmio cadastrado com sucesso!', 'success');
    switchSubPage('premios-list');
}

async function renderPremiosCategorias(container) {
    const cats = await ds.getPrizeCategories();

async function saveNewPrizeCat() {
    const name = document.getElementById('newCatName').value;
    const isSub = document.getElementById('newCatIsSub').checked;
    const parent = isSub ? parseInt(document.getElementById('newCatParent').value) : null;
    if (!name) { showToast('Preencha o nome', 'error'); return; }
    await ds.createPrizeCategory({ name, type: isSub ? 'Subcategoria' : 'Categoria', parent });
    showToast('Categoria criada!', 'success');
    renderPremiosCategorias(document.getElementById('mainContent'));
}

async function doRedeem() {
    const cpf = document.getElementById('redeemCpf').value.trim();
    const prizeId = parseInt(document.getElementById('redeemPrizeId').value);
    if (!cpf || !prizeId) { showToast('Preencha todos os campos', 'error'); return; }
    const clients = await ds.getClients({ search: cpf });
    if (clients.length === 0) { showToast('Cliente não encontrado', 'error'); return; }
    const result = await ds.redeemPrize(clients[0].id, prizeId);
    if (result.error) { showToast(result.error, 'error'); return; }
    showToast(`Resgate realizado! Voucher: ${result.voucher}`, 'success');
}

function showModal(title, bodyHtml) {
    document.getElementById('modalContent').innerHTML = `

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

/* ============================================
   TOAST SYSTEM
   ============================================ */
function showToast(msg, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
}

/* ============================================
   KEYBOARD SHORTCUTS
   ============================================ */
document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('loginPage') && !document.getElementById('loginPage').classList.contains('hidden')) {
        doLogin();
    }
    if (e.key === 'Escape') closeModal();
});
